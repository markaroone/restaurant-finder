<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Circular background -->
  <circle cx="32" cy="32" r="30" fill="#F97316" />

  <!-- Fork (left) -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork prongs -->
    <line x1="20" y1="14" x2="20" y2="26" />
    <line x1="24" y1="14" x2="24" y2="26" />
    <line x1="28" y1="14" x2="28" y2="26" />
    <!-- Fork base -->
    <path d="M20 26 Q20 30 24 30 Q28 30 28 26" />
    <!-- Fork handle -->
    <line x1="24" y1="30" x2="24" y2="50" />
  </g>

  <!-- Knife (right) -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Blade -->
    <path d="M40 14 C40 14 44 16 44 26 L40 28 Z" fill="white" fill-opacity="0.3" />
    <!-- Handle -->
    <line x1="42" y1="28" x2="42" y2="50" />
  </g>
</svg>
